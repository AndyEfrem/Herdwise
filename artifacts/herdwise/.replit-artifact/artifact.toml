kind = "web"
previewPath = "/"
title = "Herdwise"
version = "1.0.0"
id = "artifacts/herdwise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24291

[services.development]
run = "pnpm --filter @workspace/herdwise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/herdwise", "run", "build" ]
publicDir = "artifacts/herdwise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24291"
BASE_PATH = "/"
