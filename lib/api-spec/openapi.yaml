openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Herdwise API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Auth and user identity
  - name: cattle
    description: Cattle management
  - name: investors
    description: Investor management
  - name: treatments
    description: Treatment records
  - name: dashboard
    description: Dashboard summaries
  - name: reports
    description: Farm analytics and reporting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user role and investor profile
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cattle:
    get:
      operationId: listCattle
      tags: [cattle]
      summary: List all cattle
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: investorId
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of cattle
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Animal"
    post:
      operationId: createAnimal
      tags: [cattle]
      summary: Add a new animal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnimalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"

  /cattle/{id}:
    get:
      operationId: getAnimal
      tags: [cattle]
      summary: Get animal by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Animal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAnimal
      tags: [cattle]
      summary: Update animal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnimalUpdate"
      responses:
        "200":
          description: Updated animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnimal
      tags: [cattle]
      summary: Delete animal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investors:
    get:
      operationId: listInvestors
      tags: [investors]
      summary: List all investors
      responses:
        "200":
          description: List of investors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Investor"
    post:
      operationId: createInvestor
      tags: [investors]
      summary: Create investor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"

  /investors/{id}:
    get:
      operationId: getInvestor
      tags: [investors]
      summary: Get investor by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInvestor
      tags: [investors]
      summary: Update investor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorUpdate"
      responses:
        "200":
          description: Updated investor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInvestor
      tags: [investors]
      summary: Delete investor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /treatments:
    get:
      operationId: listTreatments
      tags: [treatments]
      summary: List treatments
      parameters:
        - in: query
          name: cattleId
          schema:
            type: integer
        - in: query
          name: upcoming
          schema:
            type: boolean
      responses:
        "200":
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Treatment"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Record a treatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  /treatments/{id}:
    patch:
      operationId: updateTreatment
      tags: [treatments]
      summary: Update treatment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentUpdate"
      responses:
        "200":
          description: Updated treatment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTreatment
      tags: [treatments]
      summary: Delete treatment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cattle/{id}/weights:
    get:
      operationId: listWeightRecords
      tags: [cattle]
      summary: List weight history for an animal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of weight records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addWeightRecord
      tags: [cattle]
      summary: Add a weight record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cattle/{id}/weights/{weightId}:
    delete:
      operationId: deleteWeightRecord
      tags: [cattle]
      summary: Delete a weight record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: weightId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /reports/summary:
    get:
      operationId: getReportsSummary
      tags: [reports]
      summary: Aggregated farm analytics for reporting
      responses:
        "200":
          description: Reports summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsSummary"

  /reports/investors/{investorId}:
    get:
      operationId: getInvestorReport
      tags: [reports]
      summary: Progress report scoped to a single investor's cattle
      parameters:
        - name: investorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investor progress report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorReport"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Investor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/investors/{investorId}/share:
    get:
      operationId: getInvestorShareLink
      tags: [reports]
      summary: Get the current public share link state for an investor report
      parameters:
        - name: investorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
    post:
      operationId: createInvestorShareLink
      tags: [reports]
      summary: Generate (or rotate) a public share link for an investor report
      parameters:
        - name: investorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
    delete:
      operationId: deleteInvestorShareLink
      tags: [reports]
      summary: Revoke the public share link for an investor report
      parameters:
        - name: investorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"

  /reports/shared/{token}:
    get:
      operationId: getSharedReport
      tags: [reports]
      summary: Public investor progress report accessed by share token (no auth)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Investor progress report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorReport"
        "404":
          description: Invalid or revoked share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Animal:
      type: object
      required: [id, tag, breed, status, weightKg, createdAt]
      properties:
        id:
          type: integer
        tag:
          type: string
        previousTag:
          type: ["string", "null"]
        lotNumber:
          type: ["string", "null"]
        breed:
          type: string
        sex:
          type: ["string", "null"]
        stage:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
        weightKg:
          type: ["number", "null"]
        dateReceived:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        investorId:
          type: ["integer", "null"]
        investorName:
          type: ["string", "null"]
        createdAt:
          type: string
        marketWeightKg:
          type: number
          description: Target weight (kg) at which the animal is ready for market.
        marketReady:
          type: boolean
          description: True when the current weight is at or above the market target.
        weightRecordCount:
          type: integer
          description: Number of weight records used for the projection.
        avgDailyGainKg:
          type: ["number", "null"]
          description: Average daily weight gain (kg/day) from linear regression over weight history. Null when not computable.
        daysToMarket:
          type: ["integer", "null"]
          description: Projected days until the animal reaches the market weight. 0 if already ready, null when not projectable.
        projectedMarketDate:
          type: ["string", "null"]
          description: Projected calendar date (YYYY-MM-DD) the animal reaches market weight. Null when not projectable.

    AnimalInput:
      type: object
      required: [tag, breed, status]
      properties:
        tag:
          type: string
          minLength: 1
        previousTag:
          type: ["string", "null"]
        lotNumber:
          type: ["string", "null"]
        breed:
          type: string
          minLength: 1
        sex:
          type: ["string", "null"]
        stage:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
        weightKg:
          type: ["number", "null"]
        dateReceived:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        investorId:
          type: ["integer", "null"]

    AnimalUpdate:
      type: object
      properties:
        tag:
          type: string
          minLength: 1
        previousTag:
          type: ["string", "null"]
        lotNumber:
          type: ["string", "null"]
        breed:
          type: string
          minLength: 1
        sex:
          type: ["string", "null"]
        stage:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: string
        weightKg:
          type: ["number", "null"]
        dateReceived:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        investorId:
          type: ["integer", "null"]

    Investor:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        clerkUserId:
          type: ["string", "null"]
        cattleCount:
          type: integer
        createdAt:
          type: string

    InvestorInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    InvestorUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        clerkUserId:
          type: ["string", "null"]

    Treatment:
      type: object
      required: [id, cattleId, treatmentType, scheduledDate, completed, createdAt]
      properties:
        id:
          type: integer
        cattleId:
          type: integer
        cattleTag:
          type: ["string", "null"]
        treatmentType:
          type: string
        scheduledDate:
          type: string
        completedAt:
          type: ["string", "null"]
        completed:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    TreatmentInput:
      type: object
      required: [cattleId, treatmentType, scheduledDate]
      properties:
        cattleId:
          type: integer
        treatmentType:
          type: string
          minLength: 1
        scheduledDate:
          type: string
        notes:
          type: ["string", "null"]

    TreatmentUpdate:
      type: object
      properties:
        treatmentType:
          type: string
          minLength: 1
        scheduledDate:
          type: string
        completed:
          type: boolean
        completedAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    UserProfile:
      type: object
      required: [clerkUserId, role]
      properties:
        clerkUserId:
          type: string
        role:
          type: string
          enum: [admin, investor]
        investorId:
          type: ["integer", "null"]
        investorName:
          type: ["string", "null"]

    WeightRecord:
      type: object
      required: [id, cattleId, weightKg, recordedAt, createdAt]
      properties:
        id:
          type: integer
        cattleId:
          type: integer
        weightKg:
          type: number
        recordedAt:
          type: string
        notes:
          type: ["string", "null"]
        recordedBy:
          type: ["string", "null"]
        createdAt:
          type: string

    WeightRecordInput:
      type: object
      required: [weightKg, recordedAt]
      properties:
        weightKg:
          type: number
          minimum: 0
        recordedAt:
          type: string
        notes:
          type: ["string", "null"]
        recordedBy:
          type: ["string", "null"]

    HerdStatusBreakdown:
      type: object
      required: [status, count, percentage]
      properties:
        status:
          type: string
        count:
          type: integer
        percentage:
          type: number

    UpcomingCareItem:
      type: object
      required: [id, cattleTag, treatmentType, scheduledDate]
      properties:
        id:
          type: integer
        cattleTag:
          type: string
        treatmentType:
          type: string
        scheduledDate:
          type: string

    DashboardSummary:
      type: object
      required: [totalCattle, activeCattle, activeInvestors, averageWeightKg, animalsWeighed, vaccinationsDue, herdBreakdown, upcomingCare]
      properties:
        totalCattle:
          type: integer
        activeCattle:
          type: integer
        activeInvestors:
          type: integer
        averageWeightKg:
          type: number
        animalsWeighed:
          type: integer
        vaccinationsDue:
          type: integer
        herdBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/HerdStatusBreakdown"
        upcomingCare:
          type: array
          items:
            $ref: "#/components/schemas/UpcomingCareItem"

    CategoryCount:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    WeightBucket:
      type: object
      required: [range, count]
      properties:
        range:
          type: string
        count:
          type: integer

    MarketReadinessReport:
      type: object
      required: [ready, within30, within60, within90, beyond90, notProjectable]
      properties:
        ready:
          type: integer
        within30:
          type: integer
        within60:
          type: integer
        within90:
          type: integer
        beyond90:
          type: integer
        notProjectable:
          type: integer

    GrowthTrendPoint:
      type: object
      required: [month, avgWeightKg, recordCount]
      properties:
        month:
          type: string
        avgWeightKg:
          type: number
        recordCount:
          type: integer

    TreatmentTypeStat:
      type: object
      required: [treatmentType, total, completed, pending]
      properties:
        treatmentType:
          type: string
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer

    TreatmentTotals:
      type: object
      required: [total, completed, pending]
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer

    InvestorReportRow:
      type: object
      required: [investorId, name, cattleCount, totalWeightKg, marketReadyCount]
      properties:
        investorId:
          type: integer
        name:
          type: string
        cattleCount:
          type: integer
        totalWeightKg:
          type: number
        marketReadyCount:
          type: integer

    ReportsSummary:
      type: object
      required: [totalCattle, totalHerdWeightKg, avgWeightKg, byBreed, bySex, byStage, byStatus, weightDistribution, marketReadiness, growthTrend, treatmentStats, treatmentTotals, investorBreakdown]
      properties:
        totalCattle:
          type: integer
        totalHerdWeightKg:
          type: number
        avgWeightKg:
          type: number
        byBreed:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        bySex:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byStage:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        weightDistribution:
          type: array
          items:
            $ref: "#/components/schemas/WeightBucket"
        marketReadiness:
          $ref: "#/components/schemas/MarketReadinessReport"
        growthTrend:
          type: array
          items:
            $ref: "#/components/schemas/GrowthTrendPoint"
        treatmentStats:
          type: array
          items:
            $ref: "#/components/schemas/TreatmentTypeStat"
        treatmentTotals:
          $ref: "#/components/schemas/TreatmentTotals"
        investorBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/InvestorReportRow"

    AnimalProgress:
      type: object
      required: [id, tag, breed, status, weightKg, targetWeightKg, percentToTarget, marketReady, daysToMarket, projectedMarketDate, avgDailyGainKg]
      properties:
        id:
          type: integer
        tag:
          type: string
        breed:
          type: ["string", "null"]
        status:
          type: string
        weightKg:
          type: ["number", "null"]
        targetWeightKg:
          type: number
        percentToTarget:
          type: number
          description: Current weight as a percentage of the market target (0-100, capped at 100).
        marketReady:
          type: boolean
        daysToMarket:
          type: ["integer", "null"]
        projectedMarketDate:
          type: ["string", "null"]
        avgDailyGainKg:
          type: ["number", "null"]

    InvestorReport:
      type: object
      required: [investorId, investorName, generatedAt, totalCattle, totalHerdWeightKg, avgWeightKg, marketReadyCount, weightDistribution, marketReadiness, growthTrend, treatmentStats, treatmentTotals, animals]
      properties:
        investorId:
          type: integer
        investorName:
          type: string
        generatedAt:
          type: string
        totalCattle:
          type: integer
        totalHerdWeightKg:
          type: number
        avgWeightKg:
          type: number
        marketReadyCount:
          type: integer
        weightDistribution:
          type: array
          items:
            $ref: "#/components/schemas/WeightBucket"
        marketReadiness:
          $ref: "#/components/schemas/MarketReadinessReport"
        growthTrend:
          type: array
          items:
            $ref: "#/components/schemas/GrowthTrendPoint"
        treatmentStats:
          type: array
          items:
            $ref: "#/components/schemas/TreatmentTypeStat"
        treatmentTotals:
          $ref: "#/components/schemas/TreatmentTotals"
        animals:
          type: array
          items:
            $ref: "#/components/schemas/AnimalProgress"

    ShareLink:
      type: object
      required: [enabled, token]
      properties:
        enabled:
          type: boolean
        token:
          type: ["string", "null"]
          description: Opaque share token. Null when no link is active. Frontend builds the full URL.
